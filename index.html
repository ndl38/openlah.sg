<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenLah - Check Before You Go</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'DM Mono', monospace; }
  .app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  input:focus { outline: none; }
  ::placeholder { color: #aaa; }
  .view { display: none; padding-bottom: 80px; }
  .view.active { display: block; }
  .header { padding: 48px 24px 28px; border-bottom: 1.5px solid #E0DBD0; }
  .label { font-size: 10px; letter-spacing: 0.2em; color: #999; text-transform: uppercase; margin-bottom: 10px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 44px; font-weight: 800; color: #1A1A1A; line-height: 1; }
  .logo span { color: #C84B2F; }
  .tagline { font-size: 13px; color: #999; margin-top: 10px; }
  .pad { padding: 20px 24px 0; }
  .pad-sm { padding: 12px 24px 0; }
  .btn-primary { width: 100%; padding: 15px; background: #1A1A1A; color: #F7F4EF; border-radius: 12px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'DM Mono', monospace; }
  .search-box { border: 1.5px solid #E0DBD0; border-radius: 12px; background: #fff; display: flex; align-items: center; padding: 0 16px; gap: 10px; }
  .search-box input { flex: 1; padding: 14px 0; font-size: 13px; color: #1A1A1A; background: transparent; border: none; font-family: 'DM Mono', monospace; }
  .section-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #999; margin-bottom: 12px; }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .centre-row { width: 100%; padding: 14px 16px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; text-align: left; }
  .centre-row:active { background: #f0ede6; }
  .centre-name { font-size: 12px; color: #1A1A1A; font-weight: 500; margin-bottom: 3px; }
  .centre-meta { font-size: 10px; color: #999; }
  .reports { font-size: 11px; color: #C84B2F; font-weight: 500; }
  .reports-sub { font-size: 10px; color: #999; margin-top: 2px; text-align: right; }
  .back-btn { font-size: 11px; color: #999; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; display: block; }
  .centre-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #1A1A1A; margin-bottom: 4px; }
  .stall-row { padding: 14px 16px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; }
  .stall-row.ghost { opacity: 0.45; }
  .stall-name { font-size: 13px; color: #1A1A1A; font-weight: 500; margin-bottom: 3px; }
  .stall-meta { font-size: 11px; color: #ccc; }
  .badge { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; font-weight: 500; flex-shrink: 0; margin-left: 12px; }
  .badge.open { color: #2D6A4F; background: #D8F3DC; }
  .badge.closed { color: #9B2226; background: #FFE8E8; }
  .badge.unknown { color: #999; background: #EFEFEF; }
  .confirm-btn { font-size: 10px; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 6px; border: 1.5px solid #E0DBD0; color: #999; background: #fff; font-family: 'DM Mono', monospace; flex-shrink: 0; margin-left: 8px; transition: all 0.15s; }
  .confirm-btn:active { background: #F7F4EF; }
  .report-btn { width: 100%; padding: 14px 16px; background: transparent; border: 1.5px dashed #E0DBD0; border-radius: 10px; font-size: 12px; color: #bbb; letter-spacing: 0.06em; margin-top: 4px; font-family: 'DM Mono', monospace; }
  .field-label { font-size: 10px; color: #bbb; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px; }
  .field-input { width: 100%; padding: 14px 16px; background: #fff; border: 1.5px solid #E0DBD0; border-radius: 10px; font-size: 13px; font-family: 'DM Mono', monospace; color: #1A1A1A; }
  .status-btns { display: flex; gap: 8px; }
  .status-btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; border: 1.5px solid #E0DBD0; background: #fff; color: #bbb; transition: all 0.15s; font-family: 'DM Mono', monospace; }
  .status-btn.selected-open { background: #2D6A4F; color: #fff; border-color: transparent; }
  .status-btn.selected-closed { background: #9B2226; color: #fff; border-color: transparent; }
  .submit-btn { width: 100%; padding: 16px; margin-top: 4px; background: #E0DBD0; color: #bbb; border-radius: 12px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; transition: background 0.2s; }
  .submit-btn.ready { background: #1A1A1A; color: #F7F4EF; }
  .success { text-align: center; padding-top: 60px; }
  .checkmark { font-size: 52px; margin-bottom: 16px; display: block; }
  .success-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #1A1A1A; }
  .success-sub { font-size: 12px; color: #bbb; margin-top: 8px; }
  .footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 12px 24px 24px; background: linear-gradient(to top, #F7F4EF 60%, transparent); display: flex; justify-content: center; }
  .footer-text { font-size: 10px; color: #999; letter-spacing: 0.12em; text-transform: uppercase; }
  .form-section { display: flex; flex-direction: column; gap: 14px; }
  .report-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #1A1A1A; margin-bottom: 6px; }
  .report-sub { font-size: 12px; color: #bbb; margin-bottom: 32px; }
  .empty { padding: 24px 16px; background: #fff; border-radius: 10px; text-align: center; font-size: 13px; color: #ccc; }
  .loading { padding: 24px 16px; text-align: center; font-size: 12px; color: #ccc; letter-spacing: 0.06em; }
  .clear-btn { color: #ccc; font-size: 20px; background: none; border: none; cursor: pointer; }
  .badge-cleaning { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; font-weight: 500; color: #7B4F00; background: #FFF3CD; flex-shrink: 0; margin-left: 12px; }
  .centre-row.cleaning { opacity: 0.7; }
  .cleaning-banner { background: #FFF3CD; border: 1.5px solid #FFE08A; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; font-size: 12px; color: #7B4F00; letter-spacing: 0.02em; }
  .ghost-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #ccc; margin: 12px 0 8px; }
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="view active" id="view-home">
    <div class="header">
      <div class="label">Singapore Hawker Tracker</div>
      <div class="logo">Open<span>Lah</span></div>
      <div class="tagline">Check before you go. Report when you're there.</div>
    </div>
    <div class="pad">
      <button class="btn-primary" onclick="useMyLocation()">📍 Use My Location</button>
    </div>
    <div class="pad-sm">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search area or centre name..." oninput="filterCentres(this.value)">
        <button class="clear-btn" onclick="clearSearch()" id="clear-btn" style="display:none">×</button>
      </div>
    </div>
    <div class="pad">
      <div class="section-label" id="results-label">Most Active Today</div>
      <div class="list" id="centres-list"><div class="loading">Loading hawker centres...</div></div>
    </div>
    <div class="footer"><div class="footer-text">Updated daily · Resets midnight</div></div>
  </div>

  <!-- CENTRE -->
  <div class="view" id="view-centre">
    <div class="header">
      <button class="back-btn" onclick="showView('home')">← Back</button>
      <div class="centre-title" id="centre-title"></div>
      <div class="centre-meta" id="centre-meta"></div>
    </div>
    <div class="pad">
      <div class="section-label">Stalls</div>
      <div class="list" id="stalls-list"></div>
    </div>
    <div class="footer"><div class="footer-text">Updated daily · Resets midnight</div></div>
  </div>

  <!-- REPORT -->
  <div class="view" id="view-report">
    <div style="padding: 48px 24px;">
      <button class="back-btn" onclick="showView('centre')">← Back</button>
      <div id="report-content">
        <div class="report-title">Report Status</div>
        <div class="report-sub" id="report-centre-name"></div>
        <div class="form-section">
          <div>
            <div class="field-label">Stall Number</div>
            <input class="field-input" id="stall-number" type="text" placeholder="e.g. 01-10" oninput="checkForm()">
          </div>
          <div>
            <div class="field-label">Stall Name <span style="color:#ddd">(optional)</span></div>
            <input class="field-input" id="stall-name" type="text" placeholder="e.g. Tian Tian Chicken Rice">
          </div>
          <div>
            <div class="field-label">Status</div>
            <div class="status-btns">
              <button class="status-btn" id="btn-open" onclick="selectStatus('open')">✓ Open</button>
              <button class="status-btn" id="btn-closed" onclick="selectStatus('closed')">✕ Closed</button>
            </div>
          </div>
          <button class="submit-btn" id="submit-btn" onclick="submitReport()">Submit Report</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://vvhqwqoaxtdzodceeaii.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2aHF3cW9heHRkem9kY2VlYWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDI4ODgsImV4cCI6MjA4OTgxODg4OH0.ALIgaUHqITnyy1RA3jjumW6bQ1Y5e5fj1ESs0XAD1x0';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allCentres = [];
  let selectedCentre = null;
  let selectedStatus = null;
  let neaClosures = [];

  async function fetchNEAClosures() {
    try {
      const res = await fetch('https://data.gov.sg/api/action/datastore_search?resource_id=d_bda4baa634dd1cc7a6c7cad5f19e2d68&limit=500&api_key=v2:6de4693fe51b2f4f797bdc1d3f00f3a4efa130b4c6ff0fe7077b5c66fb92a201:M08tyEt0HQLAFdQ9pLPywObioQNpYXO-');
      const json = await res.json();
      if (json.result && json.result.records) neaClosures = json.result.records;
    } catch (e) { console.log('NEA closure data unavailable', e); }
  }

  function parseNEADate(str) {
    if (!str || str === 'NA' || str === 'nil' || str === 'TBC') return null;
    const parts = str.split('/');
    if (parts.length !== 3) return null;
    return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  }

  function getCleaningStatus(centre) {
    const todayStr = today();
    const matchName = (centre.nea_name || centre.name).toLowerCase();
    const record = neaClosures.find(r => {
      const neaName = (r.name || '').toLowerCase();
      return neaName === matchName || neaName.includes(matchName.substring(0, 15)) || matchName.includes(neaName.substring(0, 15));
    });
    if (!record) return null;
    const windows = [
      { start: record.q1_cleaningstartdate, end: record.q1_cleaningenddate },
      { start: record.q2_cleaningstartdate, end: record.q2_cleaningenddate },
      { start: record.q3_cleaningstartdate, end: record.q3_cleaningenddate },
      { start: record.q4_cleaningstartdate, end: record.q4_cleaningenddate },
      { start: record.other_works_startdate, end: record.other_works_enddate },
    ];
    const isClosed = windows.some(w => {
      const start = parseNEADate(w.start);
      const end = parseNEADate(w.end);
      if (!start || !end) return false;
      return todayStr >= start && todayStr <= end;
    });
    return isClosed ? record : null;
  }

  function today() { return new Date().toISOString().split('T')[0]; }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  function daysAgo(ts) {
    const diff = Math.floor((Date.now() - new Date(ts)) / (1000 * 60 * 60 * 24));
    if (diff === 0) return 'today';
    if (diff === 1) return 'yesterday';
    return `${diff} days ago`;
  }

  function cleanAddress(addr) {
    return (addr || '').replace(/,?\s*Singapore\s*\d*/g, '').trim();
  }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    window.scrollTo(0, 0);
  }

  async function loadCentres() {
    const { data: centres, error } = await db.from('hawker_centres').select('*').order('name', { ascending: true });
    if (error) { document.getElementById('centres-list').innerHTML = '<div class="empty">Could not load hawker centres</div>'; return; }
    const { data: reports } = await db.from('stall_reports').select('hawker_centre_id').gte('reported_at', today() + 'T00:00:00').lte('reported_at', today() + 'T23:59:59');
    const reportCounts = {};
    if (reports) reports.forEach(r => { reportCounts[r.hawker_centre_id] = (reportCounts[r.hawker_centre_id] || 0) + 1; });
    allCentres = centres.map(c => {
      const neaRecord = neaClosures.find(r => {
        const neaName = (r.name || '').toLowerCase();
        const ourName = c.name.toLowerCase();
        return neaName.includes(ourName.substring(0, 10)) || ourName.includes(neaName.substring(0, 10));
      });
      return {
        ...c,
        reportCount: reportCounts[c.id] || 0,
        latitude: c.latitude || (neaRecord ? parseFloat(neaRecord.latitude_hc) : null),
        longitude: c.longitude || (neaRecord ? parseFloat(neaRecord.longitude_hc) : null),
      };
    }).sort((a, b) => b.reportCount - a.reportCount);
    renderCentres(allCentres);
  }

  function renderCentres(list) {
    const container = document.getElementById('centres-list');
    if (list.length === 0) { container.innerHTML = '<div class="empty">No hawker centres found</div>'; return; }
    container.innerHTML = list.map(c => {
      const cleaning = getCleaningStatus(c);
      const distStr = c.dist !== undefined && c.dist !== 999 ? `<span style="color:#C84B2F">${(c.dist * 111).toFixed(1)}km</span> · ` : '';
      return `
        <button class="centre-row${cleaning ? ' cleaning' : ''}" onclick="selectCentre(${c.id})">
          <div style="flex:1">
            <div class="centre-name">${c.name}</div>
            <div class="centre-meta">${distStr}${cleanAddress(c.address)}</div>
          </div>
          <div style="flex-shrink:0;margin-left:12px;text-align:right">
            ${cleaning
              ? `<div style="text-align:right"><span class="badge-cleaning">🧹 Cleaning</span><div style="font-size:10px;color:#7B4F00;margin-top:3px;">centre closed</div></div>`
              : `${c.reportCount > 0 
  ? `<span style="font-size:10px;font-weight:500;padding:4px 8px;border-radius:6px;color:#2D6A4F;background:#D8F3DC;letter-spacing:0.04em;">${c.reportCount} ${c.reportCount === 1 ? 'report' : 'reports'}</span>`
: `<span style="font-size:10px;font-weight:500;padding:4px 8px;border-radius:6px;color:#C84B2F;background:#FFE8E8;letter-spacing:0.04em;">No reports</span>`
}`
            }
          </div>
        </button>`;
    }).join('');
  }

  function filterCentres(q) {
    const clearBtn = document.getElementById('clear-btn');
    const label = document.getElementById('results-label');
    clearBtn.style.display = q ? 'block' : 'none';
    if (!q) { label.textContent = 'Most Active Today'; renderCentres(allCentres); return; }
    const filtered = allCentres.filter(h =>
      h.name.toLowerCase().includes(q.toLowerCase()) ||
      (h.area && h.area.toLowerCase().includes(q.toLowerCase())) ||
      (h.address && h.address.toLowerCase().includes(q.toLowerCase()))
    );
    label.textContent = `${filtered.length} results`;
    renderCentres(filtered);
  }

  function clearSearch() { document.getElementById('search-input').value = ''; filterCentres(''); }

  function useMyLocation() {
    if (!navigator.geolocation) { alert('Location not supported on this device'); return; }
    const label = document.getElementById('results-label');
    label.textContent = 'Finding your location...';
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;
      label.textContent = 'Nearest to You';
      const withDistance = allCentres.map(c => {
        if (c.latitude && c.longitude) {
          const dist = Math.sqrt(Math.pow(c.latitude - latitude, 2) + Math.pow(c.longitude - longitude, 2));
          return { ...c, dist };
        }
        return { ...c, dist: 999 };
      }).sort((a, b) => a.dist - b.dist);
      renderCentres(withDistance);
    }, () => {
      label.textContent = 'Most Active Today';
      alert('Could not get your location. Please allow location access and try again.');
    });
  }

  async function confirmReport(reportId, currentCount, btnEl) {
    btnEl.disabled = true;
    const newCount = currentCount + 1;
    const { error } = await db.from('stall_reports').update({ confirmations: newCount }).eq('id', reportId);
    if (!error) {
      btnEl.textContent = newCount >= 5 ? `✓ ${newCount}+` : `✓ ${newCount}`;
      btnEl.style.color = '#2D6A4F';
      btnEl.style.borderColor = '#2D6A4F';
    } else {
      btnEl.disabled = false;
    }
  }

  async function selectCentre(id) {
    selectedCentre = allCentres.find(c => c.id === id);
    document.getElementById('centre-title').textContent = selectedCentre.name;
    document.getElementById('centre-meta').textContent = cleanAddress(selectedCentre.address);
    document.getElementById('report-centre-name').textContent = selectedCentre.name;
    document.getElementById('stalls-list').innerHTML = '<div class="loading">Loading stalls...</div>';
    showView('centre');

    const cleaning = getCleaningStatus(selectedCentre);
    const list = document.getElementById('stalls-list');
    const cleaningBanner = cleaning
      ? `<div class="cleaning-banner">🧹 This hawker centre is currently closed for cleaning. Stalls are not operating.</div>`
      : '';

    // Today's reports
    const { data: todayReports } = await db
      .from('stall_reports').select('*')
      .eq('hawker_centre_id', id)
      .gte('reported_at', today() + 'T00:00:00')
      .lte('reported_at', today() + 'T23:59:59')
      .order('reported_at', { ascending: false });

    // All historical reports before today for ghost entries
    const { data: allReports } = await db
      .from('stall_reports').select('*')
      .eq('hawker_centre_id', id)
      .lt('reported_at', today() + 'T00:00:00')
      .order('reported_at', { ascending: false });

    // Deduplicate today by stall number
    const seenToday = {};
    const uniqueToday = (todayReports || []).filter(r => {
      if (seenToday[r.stall_number]) return false;
      seenToday[r.stall_number] = true;
      return true;
    });

    // Ghost entries — latest per stall, exclude today's stalls
    const seenGhost = {};
    const ghostStalls = (allReports || []).filter(r => {
      if (seenToday[r.stall_number]) return false;
      if (seenGhost[r.stall_number]) return false;
      seenGhost[r.stall_number] = true;
      return true;
    }).sort((a, b) => a.stall_number.localeCompare(b.stall_number));

    let html = cleaningBanner;

    if (uniqueToday.length === 0 && ghostStalls.length === 0) {
      html += `
        <div style="padding: 28px 16px; background: #fff; border-radius: 10px; text-align: center;">
          <div style="font-size: 14px; color: #1A1A1A; font-weight: 500; margin-bottom: 6px;">No updates yet today</div>
          <div style="font-size: 12px; color: #999; margin-bottom: 20px;">Be the first to help fellow hawker hunters 🍜</div>
          <button onclick="showView('report')" style="width:100%; padding: 14px; background: #1A1A1A; color: #F7F4EF; border-radius: 10px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; border: none; cursor: pointer;">+ Report a Stall</button>
        </div>`;
    } else {
      if (uniqueToday.length > 0) {
        html += uniqueToday.map(s => {
          const count = s.confirmations || 0;
          const countLabel = count === 0 ? 'Confirm' : (count >= 5 ? `✓ ${count}+` : `✓ ${count}`);
          return `
            <div class="stall-row">
              <div style="flex:1">
                <div class="stall-name">${s.stall_name || 'Stall ' + s.stall_number}</div>
                <div class="stall-meta">Stall ${s.stall_number} · reported ${formatTime(s.reported_at)}</div>
              </div>
              <div style="display:flex;align-items:center;flex-shrink:0;margin-left:8px">
                <span class="badge ${s.status}">${s.status === 'open' ? 'Open' : 'Closed'}</span>
                <button class="confirm-btn" onclick="confirmReport(${s.id}, ${count}, this)">${countLabel}</button>
              </div>
            </div>`;
        }).join('');
      }

      if (ghostStalls.length > 0) {
        html += `<div class="ghost-label">Previously reported</div>`;
        html += ghostStalls.map(s => `
          <div class="stall-row ghost">
            <div style="flex:1">
              <div class="stall-name">${s.stall_name || 'Stall ' + s.stall_number}</div>
              <div class="stall-meta">Stall ${s.stall_number} · last seen ${daysAgo(s.reported_at)}</div>
            </div>
            <span class="badge unknown">?</span>
          </div>`).join('');
      }

      html += `<button class="report-btn" onclick="showView('report')">+ Report a stall status</button>`;
    }

    list.innerHTML = html;
  }

  function selectStatus(s) {
    selectedStatus = s;
    document.getElementById('btn-open').className = 'status-btn' + (s === 'open' ? ' selected-open' : '');
    document.getElementById('btn-closed').className = 'status-btn' + (s === 'closed' ? ' selected-closed' : '');
    checkForm();
  }

  function checkForm() {
    const num = document.getElementById('stall-number').value;
    document.getElementById('submit-btn').className = 'submit-btn' + (num && selectedStatus ? ' ready' : '');
  }

  async function submitReport() {
    const num = document.getElementById('stall-number').value;
    const name = document.getElementById('stall-name').value;
    if (!num || !selectedStatus || !selectedCentre) return;
    const { error } = await db.from('stall_reports').insert({
      hawker_centre_id: selectedCentre.id,
      stall_number: num,
      stall_name: name || null,
      status: selectedStatus,
      reported_at: new Date().toISOString()
    });
    if (error) { alert('Something went wrong. Please try again.'); return; }
    document.getElementById('report-content').innerHTML = `
      <div class="success">
        <span class="checkmark">✓</span>
        <div class="success-title">Reported lah!</div>
        <div class="success-sub">Thanks for helping the community</div>
      </div>`;
    setTimeout(() => {
      document.getElementById('stall-number').value = '';
      document.getElementById('stall-name').value = '';
      selectedStatus = null;
      document.getElementById('report-content').innerHTML = `
        <div class="report-title">Report Status</div>
        <div class="report-sub" id="report-centre-name">${selectedCentre?.name || ''}</div>
        <div class="form-section">
          <div>
            <div class="field-label">Stall Number</div>
            <input class="field-input" id="stall-number" type="text" placeholder="e.g. 01-10" oninput="checkForm()">
          </div>
          <div>
            <div class="field-label">Stall Name <span style="color:#ddd">(optional)</span></div>
            <input class="field-input" id="stall-name" type="text" placeholder="e.g. Tian Tian Chicken Rice">
          </div>
          <div>
            <div class="field-label">Status</div>
            <div class="status-btns">
              <button class="status-btn" id="btn-open" onclick="selectStatus('open')">✓ Open</button>
              <button class="status-btn" id="btn-closed" onclick="selectStatus('closed')">✕ Closed</button>
            </div>
          </div>
          <button class="submit-btn" id="submit-btn" onclick="submitReport()">Submit Report</button>
        </div>`;
      selectCentre(selectedCentre.id);
    }, 2000);
  }

  fetchNEAClosures().then(() => loadCentres());
</script>
</body>
</html>
